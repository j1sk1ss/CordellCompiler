<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPLv3</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/CPL_logo.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/CPL_logo.png">
  <link rel="shortcut icon" href="CPL_logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/buble.css" />

  <style>
    :root {
      --bg: #f6fbf7;
      --panel: #ffffff;
      --panel-soft: #f0f7f1;
      --panel-muted: #edf6ee;
      --text: #183126;
      --muted: #5c7467;
      --line: #d8e7da;
      --brand: #4f9d69;
      --brand-strong: #3e8556;
      --brand-soft: #e6f4e8;
      --shadow: 0 10px 30px rgba(45, 92, 58, 0.08);
      --content-max: 960px;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { letter-spacing: -0.01em; }

    .app-name {
      padding: 18px 16px 10px;
      border-bottom: 1px solid var(--line);
    }

    .app-name-link {
      color: var(--text) !important;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-decoration: none;
    }

    .app-name-link small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    .sidebar-nav {
      padding: 12px 10px 24px;
      background: var(--panel);
    }

    .sidebar-nav ul,
    .sidebar-nav li,
    .sidebar-nav li ul {
      background: transparent !important;
    }

    .sidebar-nav ul { margin: 0; padding-left: 0; }
    .sidebar-nav li { list-style: none; margin: 3px 0; }

    .sidebar-nav li > p {
      margin: 18px 10px 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sidebar ul li a {
      display: block;
      padding: 9px 11px;
      margin: 0;
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.94rem;
      font-weight: 550;
      line-height: 1.35;
      border: 1px solid transparent;
    }

    .sidebar ul li a:hover {
      background: var(--panel-soft);
      border-color: var(--line);
      color: var(--brand-strong);
    }

    .sidebar ul li.active > a {
      background: var(--brand-soft) !important;
      color: var(--brand-strong) !important;
      border-color: #c7decb;
      font-weight: 700;
    }

    .sidebar ul li ul {
      margin-top: 4px;
      margin-left: 10px;
      padding-left: 10px;
      border-left: 1px solid var(--line);
    }

    .search {
      margin: 12px 12px 10px;
      padding: 0;
      border-bottom: 0;
      background: transparent;
    }

    .search input {
      width: 100%;
      height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: 0.94rem;
      outline: none;
      box-shadow: none;
    }

    .search input:focus {
      border-color: #b6d4bc;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79, 157, 105, 0.10);
    }

    .search input::placeholder { color: var(--muted); }
    .search .results-panel { background: #fff; border: 1px solid var(--line); border-radius: 12px; }
    .search .matching-post { border-bottom-color: var(--line); }
    .search .matching-post:last-child { border-bottom: 0; }

    .content { padding-top: 0; }

    .markdown-section {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 42px 52px 80px;
      color: var(--text);
    }

    .markdown-section > *:first-child { margin-top: 0 !important; }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      color: var(--text);
      letter-spacing: -0.035em;
      font-weight: 800;
    }

    .markdown-section h1 {
      font-size: clamp(2.3rem, 5vw, 3.25rem);
      margin-bottom: 0.42em;
    }

    .markdown-section h2 {
      margin-top: 2.3em;
      padding-top: 0.35em;
      border-top: 1px solid var(--line);
    }

    .markdown-section p,
    .markdown-section li,
    .markdown-section blockquote {
      color: var(--text);
      font-size: 1rem;
      line-height: 1.75;
    }

    .markdown-section strong { color: var(--text); }
    .markdown-section em { color: var(--muted); }

    .markdown-section a {
      color: var(--brand-strong);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.16em;
    }

    .markdown-section blockquote {
      border-left: 4px solid #b9d9bf;
      background: var(--panel-soft);
      border-radius: 0 12px 12px 0;
      padding: 12px 16px;
    }

    .markdown-section code {
      color: #29573a;
      background: var(--panel-soft);
      border: 1px solid #dbe9de;
      border-radius: 8px;
      padding: 0.18em 0.45em;
    }

    .markdown-section pre {
      background: #fbfefb !important;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px !important;
      box-shadow: var(--shadow);
    }

    .markdown-section pre code {
      background: transparent;
      border: 0;
      padding: 0;
      color: var(--text);
      font-size: 0.94rem;
    }

    .markdown-section table {
      display: table;
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }

    .markdown-section th,
    .markdown-section td {
      border: 0 !important;
      border-bottom: 1px solid var(--line) !important;
      padding: 12px 14px;
    }

    .markdown-section tr:last-child td { border-bottom: 0 !important; }
    .markdown-section th { background: var(--panel-soft); }

    .hero-kicker {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand-strong);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .hero-note {
      max-width: 700px;
      font-size: 1.07rem;
      color: var(--muted);
      margin: 0 0 24px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 18px 0 26px;
    }

    .hero-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 10px;
      text-decoration: none !important;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .hero-button.primary {
      background: var(--brand);
      color: #fff !important;
    }

    .hero-button.primary:hover { background: var(--brand-strong); }

    .hero-button.secondary {
      background: #fff;
      color: var(--text) !important;
      border-color: var(--line);
    }

    .hero-button.secondary:hover { background: var(--panel-soft); }

    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .doc-card {
      display: block;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: inherit !important;
      text-decoration: none !important;
      box-shadow: 0 4px 18px rgba(45, 92, 58, 0.04);
    }

    .doc-card:hover {
      border-color: #c6dccb;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(45, 92, 58, 0.08);
    }

    .doc-card h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .doc-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .section-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .docsify-pagination-container {
      margin: 42px 0 16px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .docsify-pagination {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .docsify-pagination-card,
    .docsify-pagination-current {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px 16px;
    }

    .docsify-pagination-card.right { text-align: right; }

    .docsify-pagination-label,
    .docsify-pagination-index {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .docsify-pagination-link,
    .docsify-pagination-title {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      line-height: 1.35;
    }

    .docsify-pagination-link:hover { color: var(--brand-strong); }

    .docsify-pagination-current {
      min-width: 220px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .sidebar-toggle {
      background: #fff;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .sidebar-toggle span { background: var(--brand-strong); }

    .docsify-copy-code-button {
      border-radius: 10px !important;
      border: 1px solid var(--line) !important;
      background: #fff !important;
      color: var(--text) !important;
      right: 12px !important;
      top: 12px !important;
    }

    .benchmark-card {
      margin: 24px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .benchmark-chart-wrap {
      position: relative;
      width: 100%;
      height: 420px;
    }

    .benchmark-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .benchmark-chart {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .cpl-runner {
      margin: 24px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .cpl-runner-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .cpl-runner-toolbar-left,
    .cpl-runner-toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cpl-runner-title {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .cpl-runner-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--brand-strong);
      font-size: 0.79rem;
      font-weight: 700;
    }

    .cpl-runner-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    .cpl-runner-button:hover { background: var(--brand-strong); }
    .cpl-runner-button:disabled { opacity: 0.7; cursor: wait; }

    .cpl-runner-button.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line);
    }

    .cpl-runner-button.secondary:hover { background: var(--panel-soft); }

    .cpl-runner-editor-shell {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #f8fbf8;
    }

    .cpl-runner-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #f4faf5;
    }

    .cpl-runner-tab {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border: 1px solid #cfe0d2;
      border-radius: 9px 9px 0 0;
      background: #fff;
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .cpl-runner-editor {
      width: 100%;
      height: 320px;
    }

    .cpl-runner-output {
      margin-top: 12px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfefb;
      color: var(--text);
      min-height: 72px;
      white-space: pre-wrap;
      overflow-x: auto;
      font: 0.92rem/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .cpl-runner-output.is-error {
      border-color: #e6c7c7;
      background: #fff7f7;
      color: #7a2e2e;
    }

    @media (max-width: 900px) {
      .markdown-section { padding: 34px 22px 72px; }
      .docsify-pagination { grid-template-columns: 1fr; }
      .docsify-pagination-card.right { text-align: left; }
      .docsify-pagination-current { min-width: 0; }
      .benchmark-chart-wrap { height: 320px; }
      .cpl-runner-editor { height: 260px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.CPL_RUNNER_URL='http://127.0.0.1:8000/cpl/run'; // TODO: Change
  </script>
  <script>
    function cleanRoute(route) {
      if (!route) return '';
      let value = route;
      try {
        const url = new URL(route, window.location.origin);
        value = url.hash || route;
      } catch (e) {}
      value = value.split('?')[0];
      value = value.replace(/\/+$/, '');
      return value;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    window.__benchmarkCharts = new Map();

    function destroyBenchmarkCharts() {
      for (const chart of window.__benchmarkCharts.values()) {
        chart.destroy();
      }
      window.__benchmarkCharts.clear();
    }

    function renderBenchmarkCharts() {
      if (typeof Chart === 'undefined') return;
    
      destroyBenchmarkCharts();
    
      const cards = document.querySelectorAll('.benchmark-card');
      console.log('cards=', document.querySelectorAll('.benchmark-card').length);
      for (const card of cards) {
        const canvas = card.querySelector('canvas.benchmark-chart');
        console.log('card=', card, 'canvas=', canvas, 'dataset=', card.dataset);
        if (!canvas) continue;
    
        try {
          let cfg = null;
    
          const dataNode = card.querySelector('textarea.benchmark-data');
          if (dataNode) {
            cfg = JSON.parse(dataNode.value || dataNode.textContent);
          } else {
            const labels= (card.dataset.labels || '').split('|').map(x => x.trim()).filter(Boolean);
            const values= (card.dataset.values || '').split('|').map(x => Number(x.trim())).filter(x => !Number.isNaN(x));
    
            cfg = {
              title: card.dataset.title || '',
              labels: labels,
              datasets: [{
                label: card.dataset.datasetLabel || 'Value',
                data: values,
                borderWidth: 1,
                borderRadius: 8,
                maxBarThickness: 72
              }],
              yLabel: card.dataset.yLabel || card.dataset.datasetLabel || 'Value',
              tooltipSuffix: card.dataset.tooltipSuffix || ''
            };
          }
    
          if (!cfg.labels || !cfg.labels.length || !cfg.datasets || !cfg.datasets.length) {
            throw new Error('Empty benchmark config');
          }
    
          const datasets = cfg.datasets.map(ds => ({
            borderWidth: 1,
            borderRadius: 8,
            maxBarThickness: 72,
            ...ds
          }));
    
          const chart = new Chart(canvas.getContext('2d'), {
            type: cfg.type || 'bar',
            data: {
              labels: cfg.labels,
              datasets: datasets
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: {
                mode: 'index',
                intersect: false
              },
              plugins: {
                legend: {
                  display: true,
                  position: 'top'
                },
                title: {
                  display: !!cfg.title,
                  text: cfg.title || ''
                },
                tooltip: {
                  callbacks: {
                    label: function(context) {
                      const suffix = cfg.tooltipSuffix || '';
                      const raw = context.parsed.y ?? context.raw;
                      const value = typeof raw === 'number' ? raw.toFixed(6) : raw;
                      return `${context.dataset.label}: ${value}${suffix}`;
                    }
                  }
                }
              },
              scales: {
                y: {
                  beginAtZero: true,
                  title: {
                    display: true,
                    text: cfg.yLabel || cfg.datasetLabel || 'Value'
                  }
                }
              }
            }
          });
    
          window.__benchmarkCharts.set(canvas, chart);
        } catch (err) {
          const wrap = card.querySelector('.benchmark-chart-wrap');
          if (wrap) {
            wrap.innerHTML = `<div class="benchmark-note">Chart error: ${err.message}</div>`;
          }
          console.error(err);
        }
      }
    }

    window.$docsify = {
      name: 'CPL v3.4<small>Language docs & compiler internals</small>',
      repo: 'https://github.com/j1sk1ss/CordellCompiler',
      homepage: 'README.md',
      loadSidebar: '/sidebar.md',
      alias: {
        '/.*/sidebar.md': '/sidebar.md'
      },
      subMaxLevel: 2,
      maxLevel: 3,
      routerMode: 'hash',
      auto2top: true,
      topMargin: 24,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 3,
        hideOtherSidebarContent: false,
        namespace: 'cpl-docs'
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'cpl-run') {
              const encoded = encodeURIComponent(code);
              return `
                <div class="cpl-runner" data-lang="cpl" data-code="${encoded}">
                  <div class="cpl-runner-toolbar">
                    <div class="cpl-runner-toolbar-left">
                      <div class="cpl-runner-title">CPL code editor</div>
                      <span class="cpl-runner-badge">Powered by Monaco editor</span>
                    </div>
                    <div class="cpl-runner-toolbar-right">
                      <button class="cpl-runner-button secondary" type="button" data-action="format">Format</button>
                      <button class="cpl-runner-button" type="button" data-action="run">Run</button>
                    </div>
                  </div>
                  <div class="cpl-runner-editor-shell">
                    <div class="cpl-runner-tabs">
                      <span class="cpl-runner-tab">main.cpl</span>
                    </div>
                    <div class="cpl-runner-editor"></div>
                  </div>
                  <pre class="cpl-runner-output">Editor ready. Tabs, syntax highlighting and autocomplete are enabled.</pre>
                </div>
              `;
            }

            return '<pre><code class="language-' + escapeHtml(lang || 'markup') + '">' + escapeHtml(code) + '</code></pre>';
          }
        }
      },
      plugins: [
        function(hook) {
          const pagePrefix = '#/pages/';

          function getPageLinks() {
            const nav = document.querySelector('.sidebar-nav');
            if (!nav) return [];
            const seen = new Set();
            return Array.from(nav.querySelectorAll('a'))
              .map(a => ({
                href: cleanRoute(a.getAttribute('href') || ''),
                title: (a.textContent || '').trim()
              }))
              .filter(item => item.href.startsWith(pagePrefix))
              .filter(item => {
                if (!item.href || seen.has(item.href)) return false;
                seen.add(item.href);
                return true;
              });
          }

          function removePager() {
            const old = document.querySelector('.docsify-pagination-container');
            if (old) old.remove();
          }

          function normalizeHash(href) {
            if (!href) return '';
            try {
              const url = new URL(href, window.location.origin);
              let hash = url.hash || href;
              hash = hash.replace(/\.md([?#].*)?$/, '');
              return hash;
            } catch (e) {
              return href.replace(/\.md([?#].*)?$/, '');
            }
          }

          function renderPager() {
            removePager();

            const currentHash = normalizeHash(location.hash);
            if (!currentHash.startsWith(pagePrefix)) return;

            const items = getPageLinks();
            if (!items.length) return;

            const currentIndex = items.findIndex(item => item.href === currentHash);
            if (currentIndex === -1) return;

            const prev = items[currentIndex - 1];
            const current = items[currentIndex];
            const next = items[currentIndex + 1];
            const article = document.querySelector('.content .markdown-section');
            if (!article) return;

            const wrap = document.createElement('div');
            wrap.className = 'docsify-pagination-container';
            wrap.innerHTML = `
              <div class="docsify-pagination">
                ${prev ? `<div class="docsify-pagination-card left"><div class="docsify-pagination-label">Previous</div><a class="docsify-pagination-link" href="${prev.href}">← ${prev.title}</a></div>` : '<div></div>'}
                <div class="docsify-pagination-current">
                  <div class="docsify-pagination-index">${currentIndex + 1} / ${items.length}</div>
                  <div class="docsify-pagination-title">${current.title}</div>
                </div>
                ${next ? `<div class="docsify-pagination-card right"><div class="docsify-pagination-label">Next</div><a class="docsify-pagination-link" href="${next.href}">${next.title} →</a></div>` : '<div></div>'}
              </div>
            `;
            article.appendChild(wrap);
          }

          hook.doneEach(function() {
            setTimeout(renderPager, 120);
          });

          window.addEventListener('hashchange', function() {
            setTimeout(renderPager, 120);
          });
        },

        function(hook) {
          const editors = new Map();
          let monacoReadyPromise = null;

          function decodeCode(value) {
            try {
              return decodeURIComponent(value || '');
            } catch (e) {
              return value || '';
            }
          }

          function ensureMonaco() {
            if (window.monaco && window.require) return Promise.resolve(window.monaco);
            if (monacoReadyPromise) return monacoReadyPromise;

            monacoReadyPromise = new Promise((resolve, reject) => {
              const finish = () => {
                try {
                  window.require.config({
                    paths: {
                      vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
                    }
                  });
                  window.MonacoEnvironment = {
                    getWorkerUrl: function() {
                      return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(`self.MonacoEnvironment={baseUrl:"https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/"};importScripts("https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/base/worker/workerMain.js");`);
                    }
                  };
                  window.require(['vs/editor/editor.main'], function() {
                    resolve(window.monaco);
                  }, reject);
                } catch (err) {
                  reject(err);
                }
              };

              if (window.require && window.require.config) {
                finish();
                return;
              }

              const script = document.createElement('script');
              script.src = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js';
              script.onload = finish;
              script.onerror = () => reject(new Error('Failed to load Monaco loader'));
              document.head.appendChild(script);
            });

            return monacoReadyPromise;
          }

          function registerCplLanguage(monaco) {
            if (window.__cplMonacoRegistered) return;
            window.__cplMonacoRegistered = true;

            monaco.languages.register({ id: 'cpl' });

            monaco.languages.setMonarchTokensProvider('cpl', {
              tokenizer: {
                root: [
                  [/:\//, 'comment', '@comment_block_slash'],
                  [/:(?=\s|$)/, 'comment', '@comment_block_colon'],
                  [/:([^:\n]|\\:)*:/, 'comment'],
                  [/"([^"\\]|\\.)*$/, 'string.invalid'],
                  [/"/, 'string', '@string_double'],
                  [/'([^'\\]|\\.)*$/, 'string.invalid'],
                  [/'/, 'string', '@string_single'],
                  [/\b(f64|f32|i64|i32|i16|i8|u64|u32|u16|u8|i0|str|arr|dref|ref|ptr)\b/, 'type'],
                  [/\b(as|extern|start|exit|function|return|if|else|while|switch|case|default|syscall|asm|not|ro|glob|lis|break|loop)\b/, 'keyword'],
                  [/\b(0[xX][0-9a-fA-F]+|0[bB][01]+|0[0-7]+|[0-9]*\.?[0-9]+([eE][+-]?[0-9]+)?)\b/, 'number'],
                  [/[a-zA-Z_][\w]*/, 'identifier'],
                  [/[{}()\[\]]/, '@brackets'],
                  [/[-+*/%=!<>|&.,;]/, 'delimiter']
                ],
                comment_block_slash: [
                  [/\/:/, 'comment', '@pop'],
                  [/./, 'comment'],
                  [/\n/, 'comment']
                ],
                comment_block_colon: [
                  [/^:/, 'comment', '@pop'],
                  [/./, 'comment'],
                  [/\n/, 'comment']
                ],
                string_double: [
                  [/[^\\"]+/, 'string'],
                  [/\\./, 'string.escape'],
                  [/"/, 'string', '@pop']
                ],
                string_single: [
                  [/[^\\']+/, 'string'],
                  [/\\./, 'string.escape'],
                  [/'/, 'string', '@pop']
                ]
              }
            });

            monaco.languages.setLanguageConfiguration('cpl', {
              comments: { blockComment: [':', ':'] },
              brackets: [['{', '}'], ['[', ']'], ['(', ')']],
              autoClosingPairs: [
                { open: '{', close: '}' },
                { open: '[', close: ']' },
                { open: '(', close: ')' },
                { open: '"', close: '"' },
                { open: "'", close: "'" }
              ],
              surroundingPairs: [
                { open: '{', close: '}' },
                { open: '[', close: ']' },
                { open: '(', close: ')' },
                { open: '"', close: '"' },
                { open: "'", close: "'" }
              ]
            });

            monaco.languages.registerCompletionItemProvider('cpl', {
              provideCompletionItems: function() {
                const keywords = ['as','extern','from','import','start','exit','function','return','if','else','while','switch','case','default','syscall','asm','not','ro','glob','lis','break','loop'];
                const types = ['f64','f32','i64','i32','i16','i8','u64','u32','u16','u8','i0','str','arr','dref','ref','ptr','exfunc'];
                const snippets = [
                  {
                    label: 'function',
                    kind: monaco.languages.CompletionItemKind.Snippet,
                    insertText: 'function ${1:name}(${2}) {\n\t$0\n}',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    documentation: 'Function declaration'
                  },
                  {
                    label: 'if',
                    kind: monaco.languages.CompletionItemKind.Snippet,
                    insertText: 'if ${1:condition} {\n\t$0\n}',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    documentation: 'If block'
                  },
                  {
                    label: 'while',
                    kind: monaco.languages.CompletionItemKind.Snippet,
                    insertText: 'while ${1:condition} {\n\t$0\n}',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    documentation: 'While loop'
                  },
                  {
                    label: 'switch',
                    kind: monaco.languages.CompletionItemKind.Snippet,
                    insertText: 'switch ${1:value} {\n\tcase ${2:key}:\n\t\t$0\n\tdefault:\n\t\tbreak\n}',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    documentation: 'Switch block'
                  }
                ];

                const suggestions = [
                  ...keywords.map(label => ({ label, kind: monaco.languages.CompletionItemKind.Keyword, insertText: label })),
                  ...types.map(label => ({ label, kind: monaco.languages.CompletionItemKind.TypeParameter, insertText: label })),
                  ...snippets
                ];
                return { suggestions };
              }
            });

            monaco.editor.defineTheme('cpl-light', {
              base: 'vs',
              inherit: true,
              rules: [
                { token: 'keyword', foreground: '2e7d4f', fontStyle: 'bold' },
                { token: 'type', foreground: '567d2a' },
                { token: 'comment', foreground: '7a8c80' },
                { token: 'string', foreground: '8c4f14' },
                { token: 'number', foreground: '7a3fb2' }
              ],
              colors: {
                'editor.background': '#fbfefb',
                'editorLineNumber.foreground': '#9ab3a1',
                'editorLineNumber.activeForeground': '#4f9d69',
                'editorIndentGuide.background1': '#e5efe6',
                'editor.selectionBackground': '#d8eedc',
                'editor.inactiveSelectionBackground': '#eaf5ec'
              }
            });
          }

          function simpleFormat(value) {
            const lines = value.replace(/\r\n/g, '\n').split('\n');
            let indent = 0;
            return lines.map(line => {
              const trimmed = line.trim();
              if (!trimmed) return '';
              if (/^[}\]]/.test(trimmed)) indent = Math.max(indent - 1, 0);
              const result = '\t'.repeat(indent) + trimmed;
              const opens = (trimmed.match(/[\{\[]/g) || []).length;
              const closes = (trimmed.match(/[\}\]]/g) || []).length;
              indent = Math.max(indent + opens - closes, 0);
              return result;
            }).join('\n');
          }

          async function initRunner(block) {
            if (!block || block.dataset.monacoReady === '1') return;
            block.dataset.monacoReady = '1';

            const editorMount = block.querySelector('.cpl-runner-editor');
            const output = block.querySelector('.cpl-runner-output');
            const code = decodeCode(block.dataset.code || '');

            try {
              const monaco = await ensureMonaco();
              registerCplLanguage(monaco);

              const model = monaco.editor.createModel(code, 'cpl');
              const editor = monaco.editor.create(editorMount, {
                model,
                theme: 'cpl-light',
                automaticLayout: true,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                fontSize: 14,
                lineHeight: 22,
                tabSize: 2,
                insertSpaces: false,
                detectIndentation: false,
                wordWrap: 'on',
                quickSuggestions: true,
                suggestOnTriggerCharacters: true,
                tabCompletion: 'on',
                snippetSuggestions: 'inline',
                acceptSuggestionOnEnter: 'on',
                formatOnPaste: true,
                formatOnType: true,
                roundedSelection: false,
                padding: { top: 12, bottom: 12 }
              });

              editors.set(block, editor);

              const resizeObserver = new ResizeObserver(() => editor.layout());
              resizeObserver.observe(block);
              block.__resizeObserver = resizeObserver;

              output.textContent = 'Click \'Run\' to compile and run the program!';
            } catch (err) {
              output.classList.add('is-error');
              output.textContent = 'Editor init failed: ' + err.message;
            }
          }

          async function runCpl(block) {
            const output= block.querySelector('.cpl-runner-output');
            const runButton= block.querySelector('[data-action="run"]');
            const editor= editors.get(block);
            if (!output || !runButton || !editor) return;
        
            runButton.disabled= true;
            output.classList.remove('is-error');
            output.textContent= 'Running...';
        
            const code= editor.getValue();
            const customRunner= window.CPL_RUNNER;
            const backendUrl= window.CPL_RUNNER_URL || '/cpl/run';
        
            try {
              if (customRunner && typeof customRunner.run === 'function') {
                const result= await customRunner.run({ lang: 'cpl', code, block, editor });
        
                if (typeof result === 'string') {
                  output.textContent= result || 'Execution finished with empty output.';
                } else if (result && typeof result === 'object') {
                  const parts= [];
                  if (result.stdout) parts.push(result.stdout);
                  if (result.stderr) parts.push(result.stderr);
                  if (result.result && !parts.length) {
                    parts.push(typeof result.result === 'string' ? result.result : JSON.stringify(result.result, null, 2));
                  }
                  output.textContent= parts.join('\n') || 'Execution finished with empty output.';
                } else {
                  output.textContent= 'Execution finished.';
                }
                return;
              }
        
              const response= await fetch(backendUrl, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  lang: 'cpl',
                  code
                })
              });
        
              let data= null;
              try {
                data= await response.json();
              } catch (e) {
                data= null;
              }
        
              if (!response.ok) {
                const message=
                  (data && (data.error || data.stderr || data.message)) ||
                  `Request failed with status ${response.status}`;
                throw new Error(message);
              }
        
              const parts= [];
              if (data) {
                if (data.stdout) parts.push(data.stdout);
                if (data.stderr) parts.push(data.stderr);
                if (data.result && !parts.length) {
                  parts.push(typeof data.result === 'string' ? data.result : JSON.stringify(data.result, null, 2));
                }
              }
        
              output.textContent= parts.join('\n') || 'Execution finished with empty output.';
            } catch (err) {
              output.classList.add('is-error');
              output.textContent= 'Run failed: ' + err.message;
            } finally {
              runButton.disabled= false;
            }
          }

          function bindRunnerActions(block) {
            if (!block || block.dataset.bound === '1') return;
            block.dataset.bound = '1';

            const formatButton = block.querySelector('[data-action="format"]');
            const runButton = block.querySelector('[data-action="run"]');

            if (formatButton) {
              formatButton.addEventListener('click', function() {
                const editor = editors.get(block);
                if (!editor) return;
                editor.setValue(simpleFormat(editor.getValue()));
              });
            }

            if (runButton) {
              runButton.addEventListener('click', function() {
                runCpl(block);
              });
            }
          }

          hook.doneEach(function() {
            document.querySelectorAll('.cpl-runner').forEach(block => {
              bindRunnerActions(block);
              initRunner(block);
            });
          });
        },

        function(hook) {
          hook.doneEach(function() {
            setTimeout(function() {
              renderBenchmarkCharts();
            }, 0);
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
